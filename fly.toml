# fly.toml app configuration file for nokto-ehf
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nokto-ehf'
primary_region = 'fra'

[build]

[deploy]
  release_command = 'npx prisma@5.22.0 migrate deploy'

[env]
  PORT = '3000'
  NODE_ENV = 'production'
  LOG_LEVEL = 'info'
  SHOPIFY_API_VERSION = '2025-01'
  SCOPES = 'read_orders,write_orders,read_customers,write_customers,read_products'
  SHOPIFY_API_KEY = '2a615373d7b78a56189a65de6c1d701e'
  SHOPIFY_APP_URL = 'https://nokto-ehf.fly.dev'
  MONTHLY_PRICE_NOK = '1490'
  USAGE_PRICE_PER_EHF_NOK = '6'
  INCLUDED_EHF_PER_MONTH = '50'
  TRIAL_DAYS = '7'
  RETENTION_WEBHOOK_LOGS = '90'
  RETENTION_AUDIT_LOGS = '180'
  RETENTION_INVOICES = '2555'
  PEPPOL_PROVIDER = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
